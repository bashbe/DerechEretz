{% extends "base.html" %}
{% block title %}Tableau de bord{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Tableau de bord — Surveillant</h1>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card text-bg-light">
      <div class="card-body">
        <h2 class="h6">Absences/retards saisis aujourd'hui</h2>
        <p class="display-6 mb-0">{{ absences_aujourdhui }}</p>
      </div>
    </div>
  </div>
</div>
<div class="mt-4 d-flex flex-wrap gap-2">
  <a href="{{ url_for('surveillant.absences_du_jour') }}" class="btn btn-primary">Saisir absences / retards</a>
  <a href="{{ url_for('surveillant.infractions') }}" class="btn btn-outline-secondary">Signaler une infraction mineure</a>
  <a href="{{ url_for('surveillant.incidents') }}" class="btn btn-outline-secondary">Signaler un incident majeur</a>
</div>
{% endblock %}
